services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: very-small-llm-llamacpp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8080"
    volumes:
      - model-cache:/root/.cache
    command:
      - -hf
      - Qwen/Qwen3-0.6B-GGUF:Q8_0
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "4096"
      - --parallel
      - "1"
      - --n-predict
      - "256"

volumes:
  model-cache: