services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    volumes:
      - model-cache:/root/.cache
    command:
      - -hf
      - Qwen/Qwen3-0.6B-GGUF:Q8_0
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "4096"
      - --parallel
      - "1"

volumes:
  model-cache: